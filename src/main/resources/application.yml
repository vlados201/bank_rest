server:
  port: 8081

spring:
  application:
    name: card-management-system

  datasource:
    url: jdbc:postgresql://localhost:5432/bankrestservice
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/migration/db.migration-master.yaml
    enabled: true

  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

jwt:
  secret: "V5Ebd3dUTck1hCzRUrWsuOsaAS51QEMpPwD4BTLQUjz"
  expiration: 3600000

card:
  encryption:
    secret: "wq9CsTb5r2X7Y8zKp1MdF6GnJhL0VsBw"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
